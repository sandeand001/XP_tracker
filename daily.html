<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Daily Checklist — Classroom XP Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header id="app-header">
    <h1>🪄 Classroom XP Tracker 🪄</h1>
    <span id="sync-status" class="sync-status"></span>
    <nav id="main-nav">
      <a href="index.html" class="nav-btn">Home</a>
      <a href="tracker.html" class="nav-btn">XP Tracker</a>
      <a href="daily.html" class="nav-btn active">Daily Checklist</a>
      <a href="behavior.html" class="nav-btn">Behavior</a>
      <a href="leaderboard.html" class="nav-btn">Leaderboard</a>
      <a href="currency.html" class="nav-btn">Currency</a>
      <a href="log.html" class="nav-btn">XP Log</a>
      <a href="settings.html" class="nav-btn">Settings</a>
    </nav>
  </header>

  <main id="app-main">
    <section id="tab-daily" class="page-content" data-page="daily">
      <div class="tab-header">
        <h2>📝 Daily Checklist</h2>
        <div class="tab-actions">
          <button id="btn-check-all-daily" class="btn btn-secondary">✅ Check All</button>
          <button id="btn-uncheck-all-daily" class="btn btn-secondary">⬜ Uncheck All</button>
        </div>
      </div>
      <div class="bonus-row" id="bonus-config">
        <label>Bonus A: <input type="number" id="bonusA" min="0" max="10" value="0" class="small-input" /></label>
        <label>Bonus B: <input type="number" id="bonusB" min="0" max="10" value="0" class="small-input" /></label>
        <label>Bonus C: <input type="number" id="bonusC" min="0" max="10" value="0" class="small-input" /></label>
        <label>Bonus D: <input type="number" id="bonusD" min="0" max="10" value="0" class="small-input" /></label>
      </div>
      <div class="table-wrap">
        <table id="daily-table">
          <thead>
            <tr>
              <th>Name</th><th>Test</th><th>Quiz</th><th>Faculty</th><th>Exit Ticket</th>
              <th>Writing</th><th>Kindness</th><th>Expectations</th>
              <th>Part 1</th><th>Part 2</th><th>Part 3</th><th>Part 4</th><th>Part 5</th>
              <th>Bonus A</th><th>Bonus B</th><th>Bonus C</th><th>Bonus D</th>
              <th>Total</th><th>Comment</th>
            </tr>
          </thead>
          <tbody id="daily-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/page-turn.js" defer></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
