<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 XP Tracker — Classroom XP Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <script>if(sessionStorage.getItem('ptArrival'))document.body.classList.add('pt-arrive');</script>
  <header id="app-header">
    <h1>🪄 Classroom XP Tracker 🪄</h1>
    <span id="sync-status" class="sync-status"></span>
    <nav id="main-nav">
      <a href="index.html" class="nav-btn">Home</a>
      <a href="tracker.html" class="nav-btn active">XP Tracker</a>
      <a href="daily.html" class="nav-btn">Daily Checklist</a>
      <a href="behavior.html" class="nav-btn">Behavior</a>
      <a href="leaderboard.html" class="nav-btn">Leaderboard</a>
      <a href="currency.html" class="nav-btn">Currency</a>
      <a href="log.html" class="nav-btn">XP Log</a>
      <a href="settings.html" class="nav-btn">Settings</a>
    </nav>
  </header>

  <main id="app-main">
    <section id="tab-tracker" class="page-content" data-page="tracker">
      <div class="tab-header">
        <h2>📊 XP Tracker</h2>
        <div class="tab-actions">
          <button id="btn-add-student" class="btn btn-primary">+ Add Student</button>
          <button id="btn-process-xp" class="btn btn-success">⚡ Process Daily XP</button>
          <button id="btn-recompute" class="btn btn-secondary" title="Recalculates all levels, titles, and progress bars from stored XP totals. Use after changing XP thresholds or config.">🔄 Recompute Progress</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="tracker-table">
          <thead>
            <tr>
              <th>Name</th><th>Title</th><th>Level</th><th>XP in Level</th>
              <th>XP to Next</th><th>Progress</th><th>XP Debt</th><th>Guild</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/page-turn.js" defer></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
